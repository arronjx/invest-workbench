<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>交易决策系统</title>
<style>
  :root { color-scheme:dark; --bg:#0f1115; --ink:#e8eaed; --muted:#9aa0a6; --line:#2a2f3a; --card:#181b21; --go:#34d399; --stop:#f87171; --wait:#fbbf24; }
  body { margin:0; font-family:"IBM Plex Sans","PingFang SC",sans-serif; background:var(--bg); color:var(--ink); }
  header { padding:18px 22px; border-bottom:1px solid var(--line); background:#14171c; display:flex; justify-content:space-between; align-items:center; }
  h1 { margin:0; font-size:1.2rem; font-family:"Newsreader","Songti SC",serif; }
  .wrap { max-width:920px; margin:0 auto; padding:18px; display:grid; gap:14px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  h2 { margin:0 0 10px; font-size:1rem; }
  label { display:block; margin:8px 0 4px; color:var(--muted); font-size:.85rem; }
  input,textarea,select { width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:8px; font:inherit; background:#1c2028; color:var(--ink); }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .layer { display:grid; grid-template-columns:1.4fr 90px; gap:8px; align-items:center; margin:8px 0; }
  .verdict { font-size:1.6rem; font-weight:700; font-family:ui-monospace,Menlo,monospace; }
  .go{color:var(--go)} .stop{color:var(--stop)} .wait{color:var(--wait)}
  button { padding:8px 12px; border-radius:8px; border:1px solid var(--line); background:#1c2028; color:var(--ink); cursor:pointer; margin-right:8px; }
  table { width:100%; border-collapse:collapse; font-size:.85rem; }
  th,td { border-bottom:1px solid var(--line); padding:8px; text-align:left; }
  a { color:#2dd4bf; text-decoration:none; }
  .checks label { display:flex; gap:8px; align-items:center; color:var(--ink); margin:6px 0; }
  @media (max-width:700px){ .row,.layer{grid-template-columns:1fr;} }
</style>
</head>
<body>
<header>
  <h1>交易决策 · 六层漏斗</h1>
  <a href="/">首页</a>
</header>
<div class="wrap">
  <div class="card">
    <h2>标的与情绪</h2>
    <div class="row">
      <div><label>代码</label><input id="symbol" placeholder="AAPL / 00700" /></div>
      <div><label>当时情绪</label>
        <select id="mood"><option>冷静</option><option>兴奋</option><option>恐惧</option><option>报复交易</option></select>
      </div>
    </div>
    <label>为什么会涨？（可证伪假设）</label>
    <textarea id="thesis" rows="2" placeholder="写出最关键的一条可被证伪的假设"></textarea>
  </div>

  <div class="card">
    <h2>买入漏斗</h2>
    <div class="layer"><div>① 看得懂（能力圈）— 硬门</div>
      <select id="g1"><option value="fail">否</option><option value="pass">是</option></select></div>
    <div class="layer"><div>② 逻辑与质地（0/1/2）</div>
      <select id="s2"><option>0</option><option>1</option><option selected>2</option></select></div>
    <div class="layer"><div>③ 估值与周期（0/1/2）</div>
      <select id="s3"><option>0</option><option selected>1</option><option>2</option></select></div>
    <div class="layer"><div>④ 技术与买点结构（0/1/2）</div>
      <select id="s4"><option>0</option><option selected>1</option><option>2</option></select></div>
    <div class="layer"><div>⑤ 仓位与风险（0/1/2）</div>
      <select id="s5"><option>0</option><option selected>1</option><option>2</option></select></div>
    <div class="layer"><div>⑥ 退出条件已预设（证伪点/减仓/止损）— 硬门</div>
      <select id="g6"><option value="fail">否</option><option value="pass">是</option></select></div>
    <label>退出条件摘要</label>
    <textarea id="exit" rows="2" placeholder="证伪点；机械减仓；止损位"></textarea>
    <div style="margin-top:12px" class="verdict" id="verdict">—</div>
    <div id="detail" style="color:var(--muted);margin-top:4px"></div>
  </div>

  <div class="card">
    <h2>卖点触发器（任一触发即行动）</h2>
    <div class="checks">
      <label><input type="checkbox" class="sell"> 逻辑证伪 / 基本面恶化</label>
      <label><input type="checkbox" class="sell"> 估值泡沫 / 周期见顶</label>
      <label><input type="checkbox" class="sell"> 机械减仓到点</label>
      <label><input type="checkbox" class="sell"> 止损 / 最大亏损触及</label>
      <label><input type="checkbox" class="sell"> 机会成本（更好标的）</label>
      <label><input type="checkbox" class="sell"> 风险 / 仓位失衡</label>
    </div>
    <div id="sellHint" style="margin-top:8px;color:var(--muted)">优先看逻辑，不优先看价格。</div>
  </div>

  <div class="card">
    <button onclick="saveLog()">写入交易日志</button>
    <button onclick="exportLogs()">导出 JSON</button>
    <button onclick="clearLogs()">清空日志</button>
    <div style="margin-top:12px;overflow:auto">
      <table><thead><tr><th>时间</th><th>代码</th><th>结论</th><th>分</th><th>情绪</th><th>守规</th></tr></thead>
      <tbody id="logs"></tbody></table>
    </div>
    <div id="stats" style="margin-top:8px;color:var(--muted)"></div>
  </div>
</div>
<script>
const KEY='invest-workbench-logs-v1';
function score(){
  const hardFail = document.getElementById('g1').value==='fail' || document.getElementById('g6').value==='fail';
  const soft = [2,3,4,5].map(i=>Number(document.getElementById('s'+i).value)).reduce((a,b)=>a+b,0);
  let label='不买', cls='stop', tip='硬门未过或软分过低';
  if(hardFail){ label='不买'; tip='硬门否决（能力圈或退出条件）'; }
  else if(soft>=6){ label='可买（分批）'; cls='go'; tip=`软分 ${soft}/8`; }
  else if(soft>=4){ label='观望/试探仓'; cls='wait'; tip=`软分 ${soft}/8`; }
  else { tip=`软分 ${soft}/8 < 4`; }
  document.getElementById('verdict').className='verdict '+cls;
  document.getElementById('verdict').textContent=label;
  document.getElementById('detail').textContent=tip;
  return {label, soft, hardFail, compliant:!(hardFail||soft<4)};
}
['g1','g6','s2','s3','s4','s5'].forEach(id=>document.getElementById(id).addEventListener('change',score));
document.querySelectorAll('.sell').forEach(c=>c.addEventListener('change',()=>{
  const n=[...document.querySelectorAll('.sell')].filter(x=>x.checked).length;
  document.getElementById('sellHint').textContent = n?`已触发 ${n} 个卖点 → 应行动`:'优先看逻辑，不优先看价格。';
}));
function loadLogs(){
  const logs=JSON.parse(localStorage.getItem(KEY)||'[]');
  document.getElementById('logs').innerHTML = logs.map(l=>`<tr>
    <td>${l.ts}</td><td>${l.symbol}</td><td>${l.label}</td><td>${l.soft}</td><td>${l.mood}</td><td>${l.compliant?'是':'否'}</td>
  </tr>`).join('') || '<tr><td colspan="6">暂无</td></tr>';
  const bad=logs.filter(l=>!l.compliant);
  document.getElementById('stats').textContent = `共 ${logs.length} 笔 · 违规标记 ${bad.length} 笔（请人工补录盈亏后复盘）`;
}
function saveLog(){
  const s=score();
  const row={
    ts: (() => {
      const d = new Date();
      try {
        const parts = new Intl.DateTimeFormat('sv-SE', {
          timeZone: 'Asia/Shanghai',
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit', second: '2-digit',
          hour12: false
        }).formatToParts(d);
        const g = (t) => parts.find(x => x.type === t)?.value || '';
        return `${g('year')}-${g('month')}-${g('day')} ${g('hour')}:${g('minute')}:${g('second')}`;
      } catch (_) {
        return d.toISOString().slice(0, 19).replace('T', ' ');
      }
    })(),
    symbol:document.getElementById('symbol').value||'?',
    mood:document.getElementById('mood').value,
    thesis:document.getElementById('thesis').value,
    exit:document.getElementById('exit').value,
    ...s
  };
  const logs=JSON.parse(localStorage.getItem(KEY)||'[]');
  logs.unshift(row);
  localStorage.setItem(KEY, JSON.stringify(logs.slice(0,200)));
  loadLogs();
}
function exportLogs(){
  const blob=new Blob([localStorage.getItem(KEY)||'[]'],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='trade-logs.json'; a.click();
}
function clearLogs(){ if(confirm('确认清空？')){ localStorage.removeItem(KEY); loadLogs(); } }
score(); loadLogs();
</script>
</body>
</html>
